name: web CI

# Typecheck + lint + build the web app on any change under web/.
# No secrets needed: NEXT_PUBLIC_* are only inlined for the client bundle;
# the funnel pages are server-rendered on demand (not at build), so an empty
# Supabase env still builds cleanly.
on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
